name: QA Automated Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

permissions:
  contents: read
  pages: write
  id-token: write

# ============================================================
# Jobs
# ============================================================
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
        python-version: ["3.9"]

    name: "Test (${{ matrix.browser }})"

    steps:
    # ── Setup ──
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyyaml

    # ── Browser Setup ──
    - name: Setup Chrome
      if: matrix.browser == 'chrome'
      uses: browser-actions/setup-chrome@latest

    - name: Setup Firefox
      if: matrix.browser == 'firefox'
      uses: browser-actions/setup-firefox@latest
      with:
        firefox-version: latest

    # ── Run Tests ──
    - name: Run Tests (Headless)
      run: |
        python run_tests.py \
          --browser ${{ matrix.browser }} \
          --headless \
          --test-file first.json
      env:
        QA_ATB_DEFAULT_HEADLESS: "true"

    # ── Upload Results ──
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results-${{ matrix.browser }}
        path: allure_results/
        retention-days: 14

    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: failure-screenshots-${{ matrix.browser }}
        path: screenshots/
        retention-days: 14

  # ============================================================
  # Slack Notification
  # ============================================================
  notify:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
    - name: Determine Status
      id: status
      run: |
        if [ "${{ needs.test.result }}" == "success" ]; then
          echo "emoji=✅" >> $GITHUB_OUTPUT
          echo "text=All tests passed!" >> $GITHUB_OUTPUT
          echo "color=good" >> $GITHUB_OUTPUT
        else
          echo "emoji=❌" >> $GITHUB_OUTPUT
          echo "text=Some tests failed!" >> $GITHUB_OUTPUT
          echo "color=danger" >> $GITHUB_OUTPUT
        fi

    - name: Send Slack Notification
      if: env.SLACK_WEBHOOK_URL != ''
      uses: slackapi/slack-github-action@v2.0.0
      with:
        webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        webhook-type: incoming-webhook
        payload: |
          {
            "text": "${{ steps.status.outputs.emoji }} QA Tests: ${{ steps.status.outputs.text }}",
            "attachments": [
              {
                "color": "${{ steps.status.outputs.color }}",
                "fields": [
                  { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                  { "title": "Workflow", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>", "short": false }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
